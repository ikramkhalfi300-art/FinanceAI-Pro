<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceAI Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);min-height:100vh;padding:20px}
.container{max-width:850px;margin:0 auto}
.header{text-align:center;color:white;padding:40px 0 30px}
.header h1{font-size:2.5rem;font-weight:700;margin-bottom:8px}
.header h1 span{color:#63b3ed}
.header p{opacity:.8;font-size:1rem}
.lang-bar{display:flex;justify-content:center;gap:10px;margin-bottom:25px}
.lang-btn{padding:8px 20px;border:2px solid rgba(255,255,255,.3);background:transparent;color:white;border-radius:25px;cursor:pointer;font-size:.9rem;transition:all .2s}
.lang-btn.active,.lang-btn:hover{background:#3182ce;border-color:#3182ce}
.card{background:white;border-radius:20px;padding:35px;box-shadow:0 25px 60px rgba(0,0,0,.3);margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
label{display:block;font-weight:600;color:#2d3748;margin-bottom:8px;font-size:.9rem}
select{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:10px;font-size:1rem;color:#2d3748;background:#f7fafc}
select:focus{outline:none;border-color:#3182ce}
.upload-zone{border:2px dashed #bee3f8;border-radius:15px;padding:40px;text-align:center;background:#ebf8ff;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:#3182ce;background:#dbeafe}
.upload-zone .icon{font-size:3rem;margin-bottom:12px}
.upload-zone p{color:#2b6cb0;font-weight:600;margin-bottom:5px}
.upload-zone small{color:#718096}
.file-types{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.file-type{background:#3182ce;color:white;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
.btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:15px}
.btn-analyze{background:linear-gradient(135deg,#3182ce,#2b6cb0);color:white}
.btn-analyze:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(49,130,206,.4)}
.btn-analyze:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-pdf{background:linear-gradient(135deg,#38a169,#276749);color:white;margin-top:12px}
.btn-pdf:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(56,161,105,.4)}
.loading{display:none;text-align:center;padding:30px;color:white}
.spinner{width:55px;height:55px;border:4px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 15px}
@keyframes spin{to{transform:rotate(360deg)}}
.result{display:none}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.result-header h3{color:#1a365d;font-size:1.3rem}
.badge{background:#ebf8ff;color:#2b6cb0;padding:5px 15px;border-radius:20px;font-size:.85rem;font-weight:600}
.result-body{background:#f7fafc;border:1px solid #e2e8f0;border-radius:12px;padding:25px;white-space:pre-wrap;font-size:.9rem;line-height:1.8;color:#2d3748;max-height:450px;overflow-y:auto}
.error{background:#fff5f5;border:1px solid #fed7d7;color:#c53030;padding:15px;border-radius:10px;margin-top:15px;display:none}
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:25px}
.feature{background:rgba(255,255,255,.1);border-radius:12px;padding:20px;text-align:center;color:white}
.feature .icon{font-size:2rem;margin-bottom:8px}
.feature p{font-size:.85rem;opacity:.8}
@media(max-width:600px){.form-row{grid-template-columns:1fr}.features{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">

<div class="header">
    <h1>Finance<span>AI</span> Pro</h1>
    <p id="subtitle">Intelligent Financial Analysis Powered by Claude AI</p>
</div>

<div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('en')">🇬🇧 English</button>
    <button class="lang-btn" onclick="setLang('ar')">🇩🇿 العربية</button>
    <button class="lang-btn" onclick="setLang('fr')">🇫🇷 Français</button>
</div>

<div class="features">
    <div class="feature"><div class="icon">📊</div><p id="f1">Excel & CSV</p></div>
    <div class="feature"><div class="icon">📄</div><p id="f2">PDF Documents</p></div>
    <div class="feature"><div class="icon">🧾</div><p id="f3">Invoice Images</p></div>
</div>

<div class="card">
    <div class="form-row">
        <div>
            <label id="lbl-currency">💱 Currency</label>
            <select id="currency">
                <option value="USD">🇺🇸 USD - US Dollar</option>
                <option value="EUR">🇪🇺 EUR - Euro</option>
                <option value="DZD">🇩🇿 DZD - Algerian Dinar</option>
                <option value="SAR">🇸🇦 SAR - Saudi Riyal</option>
                <option value="AED">🇦🇪 AED - UAE Dirham</option>
                <option value="GBP">🇬🇧 GBP - British Pound</option>
                <option value="MAD">🇲🇦 MAD - Moroccan Dirham</option>
                <option value="EGP">🇪🇬 EGP - Egyptian Pound</option>
                <option value="TND">🇹🇳 TND - Tunisian Dinar</option>
            </select>
        </div>
        <div>
            <label id="lbl-report-lang">🌐 Report Language</label>
            <select id="reportLang">
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="fr">Français</option>
            </select>
        </div>
    </div>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <div class="icon">📁</div>
        <p id="upload-text">Click to upload your financial file</p>
        <small id="upload-sub">Drag & drop or click to browse</small>
        <div class="file-types">
            <span class="file-type">CSV</span>
            <span class="file-type">XLSX</span>
            <span class="file-type">PDF</span>
            <span class="file-type">JPG</span>
            <span class="file-type">PNG</span>
        </div>
    </div>
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.pdf,.jpg,.jpeg,.png,.webp" style="display:none">

    <button class="btn btn-analyze" id="analyzeBtn" onclick="analyze()">
        <span id="btn-text">🚀 Analyze Now</span>
    </button>
    <div class="error" id="errorMsg"></div>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loading-text" style="font-size:1.1rem;margin-bottom:8px">Analyzing your data...</p>
    <p style="opacity:.7;font-size:.9rem" id="loading-sub">This may take 1-2 minutes</p>
</div>

<div class="card result" id="resultCard">
    <div class="result-header">
        <h3 id="result-title">📊 Analysis Result</h3>
        <span class="badge" id="resultBadge">USD</span>
    </div>
    <div class="result-body" id="resultBody"></div>
    <button class="btn btn-pdf" onclick="downloadPDF()">
        📥 <span id="pdf-btn-text">Download PDF Report</span>
    </button>
</div>

</div>

<script>
const translations = {
    en: {
        subtitle: "Intelligent Financial Analysis Powered by Claude AI",
        f1: "Excel & CSV Files", f2: "PDF Documents", f3: "Invoice Images",
        lblCurrency: "💱 Currency", lblLang: "🌐 Report Language",
        uploadText: "Click to upload your financial file",
        uploadSub: "Supports: CSV, Excel, PDF, JPG, PNG",
        btnText: "🚀 Analyze Now",
        loadingText: "Analyzing your data...",
        loadingSub: "This may take 1-2 minutes",
        resultTitle: "📊 Analysis Result",
        pdfBtn: "📥 Download PDF Report"
    },
    ar: {
        subtitle: "تحليل مالي ذكي مدعوم بـ Claude AI",
        f1: "ملفات Excel و CSV", f2: "مستندات PDF", f3: "صور الفواتير",
        lblCurrency: "💱 العملة", lblLang: "🌐 لغة التقرير",
        uploadText: "اضغط لرفع ملفك المالي",
        uploadSub: "يدعم: CSV, Excel, PDF, JPG, PNG",
        btnText: "🚀 تحليل الآن",
        loadingText: "جاري تحليل بياناتك...",
        loadingSub: "قد يستغرق 1-2 دقيقة",
        resultTitle: "📊 نتيجة التحليل",
        pdfBtn: "📥 تحميل تقرير PDF"
    },
    fr: {
        subtitle: "Analyse Financière Intelligente par Claude AI",
        f1: "Fichiers Excel & CSV", f2: "Documents PDF", f3: "Images de Factures",
        lblCurrency: "💱 Devise", lblLang: "🌐 Langue du Rapport",
        uploadText: "Cliquez pour uploader votre fichier",
        uploadSub: "Supporte: CSV, Excel, PDF, JPG, PNG",
        btnText: "🚀 Analyser Maintenant",
        loadingText: "Analyse en cours...",
        loadingSub: "Cela peut prendre 1-2 minutes",
        resultTitle: "📊 Résultat de l'Analyse",
        pdfBtn: "📥 Télécharger le Rapport PDF"
    }
};

let currentLang = 'en';

function setLang(lang) {
    currentLang = lang;
    const t = translations[lang];
    document.getElementById('subtitle').textContent = t.subtitle;
    document.getElementById('f1').textContent = t.f1;
    document.getElementById('f2').textContent = t.f2;
    document.getElementById('f3').textContent = t.f3;
    document.getElementById('lbl-currency').textContent = t.lblCurrency;
    document.getElementById('lbl-report-lang').textContent = t.lblLang;
    document.getElementById('upload-text').textContent = t.uploadText;
    document.getElementById('upload-sub').textContent = t.uploadSub;
    document.getElementById('btn-text').textContent = t.btnText;
    document.getElementById('loading-text').textContent = t.loadingText;
    document.getElementById('loading-sub').textContent = t.loadingSub;
    document.getElementById('result-title').textContent = t.resultTitle;
    document.getElementById('pdf-btn-text').textContent = t.pdfBtn;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('reportLang').value = lang;
}

document.getElementById('fileInput').addEventListener('change', function() {
    if (this.files[0]) {
        document.getElementById('upload-text').textContent = '✅ ' + this.files[0].name;
    }
});

async function analyze() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) {
        showError('Please upload a file first');
        return;
    }

    document.getElementById('analyzeBtn').disabled = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';

    const selectedLang = currentLang;
    console.log("Sending language:", selectedLang);

    const formData = new FormData();
    formData.append('file', file);
    formData.append('currency', document.getElementById('currency').value);
    formData.append('Language', selectedLang);

    try {
        const res = await fetch('/analyze', {method:'POST', body:formData});
        const data = await res.json();

        if (data.success) {
            document.getElementById('resultBody').textContent = data.analysis;
            document.getElementById('resultBadge').textContent = '💱 ' + data.currency;
            document.getElementById('resultCard').style.display = 'block';
        } else {
            showError(data.error || 'Analysis failed');
        }
    } catch(e) {
        showError('Connection error: ' + e.message);
    } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('analyzeBtn').disabled = false;
    }
}


function downloadPDF() { window.open('/download-pdf', '_blank'); }

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
}
</script>
</body>
</html>
